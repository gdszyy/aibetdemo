name: Auto Tag and Release

on:
  push:
    branches:
      - test
      - test1
      - test2

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for checking checking existing tags if needed
      - name: Determine Tag Name
        id: vars
        run: |
          BRANCH="${{ github.ref_name }}"
          
          if [ "$BRANCH" == "test" ]; then
            SUFFIX="test"
          elif [ "$BRANCH" == "test1" ]; then
            SUFFIX="xptest1"
          elif [ "$BRANCH" == "test2" ]; then
            SUFFIX="xptest2"
          else
            echo "Unexpected branch trigger: $BRANCH"
            exit 1
          fi

          # Find latest tag matching the suffix from remote, sorted by version
          # Uses ls-remote to check server directly, avoiding local fetch issues
          # Filters out legacy date-based tags (starting with 20...) to ensure we pick strict semver (e.g. 1.1.144)
          echo "Checking remote tags for suffix: $SUFFIX"
          LATEST_TAG=$(git ls-remote --tags origin "*-$SUFFIX" | awk '{print $2}' | sed 's|^refs/tags/||' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | grep -vE '^20[0-9]{2}' | sort -V | tail -n 1)

          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tag found for suffix $SUFFIX. Defaulting to 1.0.0"
            NEW_VERSION="1.0.0"
          else
            echo "Latest tag found: $LATEST_TAG"
            # Remove suffix to get version part (e.g., 1.1.143-test -> 1.1.143)
            VERSION_PART=${LATEST_TAG%-$SUFFIX}
            
            # Split version into array
            IFS='.' read -r -a PARTS <<< "$VERSION_PART"
            LEN=${#PARTS[@]}
            
            if [ "$LEN" -ge 3 ]; then
              # Increment the last part (Patch version)
              LAST_INDEX=$((LEN - 1))
              PARTS[$LAST_INDEX]=$((PARTS[$LAST_INDEX] + 1))
              NEW_VERSION=$(IFS=. ; echo "${PARTS[*]}")
            else
               # Fallback for unexpected formats, force 1.0.0 base
               echo "Unexpected version format. Resetting to 1.0.0 base."
               NEW_VERSION="1.0.0"
            fi
          fi
          
          TAG="${NEW_VERSION}-${SUFFIX}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Target Tag: ${TAG}"

      - name: Check, Create and Push Tag
        id: tag_push
        env:
          TAG_NAME: ${{ steps.vars.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if tag already exists on remote
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; then
             echo "Tag $TAG_NAME already exists on remote. Skipping creation."
             echo "created=false" >> $GITHUB_OUTPUT
          else
            echo "Creating tag $TAG_NAME..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
            echo "created=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.tag_push.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.tag }}
          draft: false
          prerelease: true
          generate_release_notes: true
